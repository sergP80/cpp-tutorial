name: CMake

on:
  push:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
            build_type: Release

          - os: windows-latest
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure (Linux / GCC)
        if: runner.os == 'Linux'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build (Linux / GCC)
        if: runner.os == 'Linux'
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

#      - name: Test (Linux / GCC)
#        if: runner.os == 'Linux'
#        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Configure (Windows / MSVC)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64

      - name: Build (Windows / MSVC)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

#      - name: Test (Windows / MSVC)
#        if: runner.os == 'Windows'
#        shell: pwsh
#        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure
